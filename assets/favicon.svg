<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue circle background -->
  <circle cx="50" cy="50" r="50" fill="#2196F3"/>

  <!-- Briefcase handle -->
  <rect x="38" y="22" width="24" height="12" rx="4" ry="4" fill="#0d3a5c" stroke="white" stroke-width="2.5"/>

  <!-- Briefcase body -->
  <rect x="16" y="32" width="68" height="46" rx="7" ry="7" fill="#0d3a5c" stroke="white" stroke-width="2.5"/>

  <!-- Flap curve -->
  <path d="M16 54 Q50 68 84 54" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Clasp -->
  <rect x="44" y="50" width="12" height="9" rx="4" ry="4" fill="white"/>

  <!-- Bottom divider line -->
  <line x1="16" y1="68" x2="84" y2="68" stroke="white" stroke-width="2" opacity="0.5"/>
</svg>
